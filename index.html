<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Hookshot - Secure Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; right: 40px; font-size: 28px; font-weight: bold; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; z-index: 10; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; background: rgba(5, 5, 15, 0.98); padding: 40px; border: 3px solid #ff3333; border-radius: 10px; box-shadow: 0 0 30px #ff3333; z-index: 100; min-width: 350px; }
        .final-score { font-size: 44px; color: #00ffff; text-shadow: 0 0 15px #00ffff; margin: 15px 0; }
        #leaderboard { margin: 20px 0; border-top: 1px solid #444; padding-top: 15px; }
        #rankList { list-style: none; padding: 0; margin: 10px 0; text-align: left; }
        #rankList li { font-size: 15px; margin-bottom: 6px; color: #ffff00; display: flex; justify-content: space-between; }
        #rankList li span.name { color: #fff; font-weight: bold; }
        #nameInputArea { margin-bottom: 20px; }
        #playerName { background: #111; border: 2px solid #00ffff; color: #fff; padding: 10px; font-family: inherit; width: 160px; outline: none; text-align: center; font-size: 16px; }
        #submitBtn, #rebootBtn { padding: 12px 24px; background: transparent; color: #00ffff; border: 2px solid #00ffff; font-family: inherit; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px; }
        #submitBtn:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }
        #rebootBtn { color: #ff3333; border-color: #ff3333; display: none; }
        #rebootBtn:hover { background: #ff3333; color: white; box-shadow: 0 0 15px #ff3333; }
    </style>
</head>
<body>
    <div id="ui">DIST: <span id="score">0</span>m</div>
    <div id="msg">
        <h1 style="color: #ff3333; text-shadow: 0 0 10px #ff3333; margin: 0; font-size: 28px;">SYSTEM CRASHED</h1>
        <div class="final-score"><span id="finalScoreText">0</span>m</div>
        <div id="nameInputArea">
            <input type="text" id="playerName" placeholder="ENTER NAME" maxlength="8">
            <button id="submitBtn">UPLOAD SCORE</button>
        </div>
        <div id="leaderboard">
            <div style="font-size: 14px; color: #ff00ff; margin-bottom: 10px; letter-spacing: 2px;">GLOBAL TOP 10</div>
            <ul id="rankList"><li>Syncing data...</li></ul>
        </div>
        <button id="rebootBtn" onclick="location.reload()">[ REBOOT SYSTEM ]</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBBFWrlHqn0o67pnx2Fzq70YD_NOv_sxo",
            authDomain: "hook-ee923.firebaseapp.com",
            projectId: "hook-ee923",
            storageBucket: "hook-ee923.firebasestorage.app",
            messagingSenderId: "1043446793127",
            appId: "1:1043446793127:web:32112b9c8e5cb29ef92c82",
            databaseURL: "https://hook-ee923-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const msgElement = document.getElementById('msg');
        const finalScoreText = document.getElementById('finalScoreText');
        const rebootBtn = document.getElementById('rebootBtn');
        const rankListUI = document.getElementById('rankList');
        const submitBtn = document.getElementById('submitBtn');
        const playerNameInput = document.getElementById('playerName');

        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let score = 0, isGameOver = false, isStarted = false, canReboot = false;
        let cameraX = 0, deadlineX = -600, mousePos = { x: 0, y: 0 };
        let particles = [], obstacles = [], keys = {};
        let guideOpacity = 1;

        const gravity = 0.6, jumpForce = -16, maxHookDist = 700;
        const player = { x: 400, y: canvas.height/2, vx: 0, vy: 0, size: 22, color: '#00ffff', onGround: false, alive: true };
        const hook = { active: false, x: 0, y: 0, length: 0 };

        let audioCtx, windGain;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const noise = audioCtx.createBuffer(1, 2 * audioCtx.sampleRate, audioCtx.sampleRate);
            const output = noise.getChannelData(0);
            for (let i = 0; i < noise.length; i++) output[i] = Math.random() * 2 - 1;
            const source = audioCtx.createBufferSource(); source.buffer = noise; source.loop = true;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
            windGain = audioCtx.createGain(); windGain.gain.value = 0;
            source.connect(filter); filter.connect(windGain); windGain.connect(audioCtx.destination);
            source.start();
        }

        function playSound(f, t, d, v) {
            if (!audioCtx || isGameOver) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = f; o.frequency.setValueAtTime(t, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }

        function playPazic() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            for(let i=0; i<3; i++){
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = i%2===0?'sawtooth':'square';
                o.frequency.setValueAtTime(2000 + Math.random()*2000, now + (i*0.05));
                g.gain.setValueAtTime(0.2, now + (i*0.05));
                g.gain.linearRampToValueAtTime(0, now + 0.1 + (i*0.05));
                o.connect(g); g.connect(audioCtx.destination);
                o.start(now + (i*0.05)); o.stop(now + 0.2 + (i*0.05));
            }
        }

        obstacles.push({ x: 0, y: canvas.height/2 + 100, w: 1200, h: 40, type: 'platform' });
        window.addEventListener('mousemove', e => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (isGameOver && canReboot && e.code === 'Space') location.reload();
            if (!isStarted && (keys['KeyA'] || keys['KeyD'] || keys['Space'])) { isStarted = true; initAudio(); }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        window.addEventListener('mousedown', e => {
            initAudio(); if (isGameOver || !player.alive) return;
            if (!isStarted) isStarted = true;
            const sx = player.x+11, sy = player.y+11;
            const ang = Math.atan2(e.clientY-sy, (e.clientX + cameraX)-sx);
            const tx = sx + Math.cos(ang)*maxHookDist, ty = sy + Math.sin(ang)*maxHookDist;
            let hit = null, minT = 2.0;
            for (let obs of obstacles) {
                const h = getRayIntersection(sx, sy, tx, ty, obs);
                if (h && h.t < minT) { minT = h.t; hit = h; }
            }
            if (hit) {
                hook.active = true; hook.x = hit.x; hook.y = hit.y;
                hook.length = Math.sqrt((hook.x-sx)**2 + (hook.y-sy)**2);
                playSound('square', 800, 0.05, 0.2);
            } else { playSound('sawtooth', 200, 0.1, 0.1); }
        });
        window.addEventListener('mouseup', () => hook.active = false);

        function getRayIntersection(x1, y1, x2, y2, obs) {
            const dx = x2 - x1, dy = y2 - y1;
            const l = obs.x, r = obs.x + obs.w, t = obs.y, b = obs.y + obs.h;
            let tMin = -Infinity, tMax = Infinity;
            if (dx !== 0) { let t1 = (l - x1) / dx, t2 = (r - x1) / dx; tMin = Math.max(tMin, Math.min(t1, t2)); tMax = Math.min(tMax, Math.max(t1, t2)); }
            if (dy !== 0) { let t1 = (t - y1) / dy, t2 = (b - y1) / dy; tMin = Math.max(tMin, Math.min(t1, t2)); tMax = Math.min(tMax, Math.max(t1, t2)); }
            if (tMax >= tMin && tMax > 0 && tMin < 1) return { x: x1 + (tMin < 0 ? 0 : tMin) * dx, y: y1 + (tMin < 0 ? 0 : tMin) * dy, t: tMin < 0 ? 0 : tMin };
            return null;
        }

        function update() {
            if (isGameOver) { particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; }); return; }
            if (!isStarted) return;
            if (guideOpacity > 0) guideOpacity -= 0.015;
            if (keys['Space'] && player.onGround) { player.vy = jumpForce; player.onGround = false; playSound('sine', 400, 0.2, 0.4); }
            if (keys['KeyA']) player.vx -= 0.8; if (keys['KeyD']) player.vx += 0.8;
            player.vy += gravity; player.vx *= 0.97; player.vy *= 0.99;
            if (hook.active) {
                if (keys['ShiftLeft'] || keys['ShiftRight']) hook.length = Math.max(20, hook.length - 11.25);
                const dx = (player.x+11)-hook.x, dy = (player.y+11)-hook.y, dist = Math.sqrt(dx*dx+dy*dy);
                if (dist > hook.length) {
                    const nx = dx/dist, ny = dy/dist; player.x = hook.x + nx*hook.length - 11; player.y = hook.y + ny*hook.length - 11;
                    const dot = player.vx*nx + player.vy*ny; if (dot > 0) { player.vx -= dot*nx; player.vy -= dot*ny; }
                    player.onGround = false;
                }
            }
            player.x += player.vx; checkCollisions(true); player.y += player.vy; checkCollisions(false);
            if (windGain) {
                const s = Math.sqrt(player.vx**2 + player.vy**2);
                windGain.gain.setTargetAtTime((!player.onGround && s > 5) ? Math.min(0.2, s*0.01) : 0, audioCtx.currentTime, 0.1);
            }
            cameraX += (player.x - cameraX - 400) * 0.15;
            deadlineX += 6.5 + (Math.max(0, player.x - deadlineX) * 0.012);
            if (player.y > canvas.height + 500 || player.x < deadlineX) finishGame();
            if (lastSpawnX < cameraX + canvas.width + 800) spawnChunk();
            score = Math.max(0, Math.floor(player.x / 10)); scoreElement.innerText = score;
        }

        let lastSpawnX = 1200;
        function spawnChunk() {
            const spacing = 300 + Math.random() * 300, type = Math.random() > 0.35 ? 'platform' : 'danger';
            let w, h, y;
            if (type === 'danger') { w = 60; h = 250 + Math.random()*150; y = 0; }
            else { w = 200 + Math.random()*200; h = 35; y = 250 + Math.random()*(canvas.height-400); }
            obstacles.push({ x: lastSpawnX + spacing, y: y, w: w, h: h, type: type });
            lastSpawnX += spacing;
        }

        function checkCollisions(ax) {
            for (let o of obstacles) {
                if (player.x < o.x + o.w && player.x + player.size > o.x && player.y < o.y + o.h && player.y + player.size > o.y) {
                    if (o.type === 'danger') { finishGame(); return; }
                    if (ax) { player.x = player.vx > 0 ? o.x - player.size : o.x + o.w; player.vx = 0; }
                    else { if (player.vy > 0) { player.y = o.y - player.size; player.onGround = true; } else { player.y = o.y + o.h; } player.vy = 0; }
                }
            }
        }

        function finishGame() {
            if(isGameOver) return; isGameOver = true; player.alive = false;
            if (windGain) windGain.gain.setValueAtTime(0, audioCtx.currentTime);
            playPazic();
            for (let i=0; i<25; i++) particles.push({ x: player.x+11-cameraX, y: player.y+11, vx: (Math.random()-0.5)*14, vy: (Math.random()-0.5)*14, size: Math.random()*7+2, life: 1, color: Math.random()>0.5?'#ff00ff':'#00ffff' });
            finalScoreText.innerText = score;
            msgElement.style.display = 'block';
            loadRanking();
            setTimeout(() => { canReboot = true; rebootBtn.style.display = 'inline-block'; }, 1000);
        }

        function loadRanking() {
            const scoresRef = query(ref(db, 'scores'), orderByChild('score'), limitToLast(10));
            onValue(scoresRef, (snapshot) => {
                const data = snapshot.val();
                const sorted = [];
                for (let id in data) sorted.push(data[id]);
                sorted.sort((a, b) => b.score - a.score);
                rankListUI.innerHTML = sorted.map((s, i) => `<li><span>${i+1}. <span class="name">${s.name}</span></span> <span>${s.score}m</span></li>`).join('') || "<li>No data yet</li>";
            });
        }

        submitBtn.onclick = () => {
            const name = playerNameInput.value.trim().toUpperCase() || "ANON";
            // 클라이언트 사이드 검증 (주작 방어 1차)
            if (score <= 0 || score > 100000) return;
            const newRef = push(ref(db, 'scores'));
            set(newRef, { name: name, score: score }).then(() => {
                document.getElementById('nameInputArea').innerHTML = "<p style='color:#00ffff; font-weight:bold;'>SCORE SYNCHRONIZED</p>";
            }).catch(e => {
                alert("ACCESS DENIED: TAMPERING DETECTED.");
            });
        };

        function draw() {
            ctx.fillStyle = '#020205'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
            ctx.fillStyle = 'rgba(255, 0, 0, 0.15)'; ctx.fillRect(0, 0, deadlineX-cameraX, canvas.height);
            ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(deadlineX-cameraX, 0); ctx.lineTo(deadlineX-cameraX, canvas.height); ctx.stroke();

            const px = player.x-cameraX+11, py = player.y+11;
            if (!isGameOver && player.alive && !hook.active) {
                const worldMouseX = mousePos.x + cameraX;
                const ang = Math.atan2(mousePos.y - py, worldMouseX - (player.x+11));
                let canHit = false;
                const tx = (player.x+11) + Math.cos(ang)*maxHookDist;
                const ty = (player.y+11) + Math.sin(ang)*maxHookDist;
                for (let o of obstacles) if (getRayIntersection(player.x+11, player.y+11, tx, ty, o)) { canHit = true; break; }
                ctx.save(); ctx.beginPath(); ctx.setLineDash([8, 6]);
                ctx.moveTo(px, py); ctx.lineTo(px + Math.cos(ang)*maxHookDist, py + Math.sin(ang)*maxHookDist);
                ctx.strokeStyle = canHit ? '#ffff00' : '#440000'; ctx.lineWidth = 2.5; ctx.stroke(); ctx.restore();
            }

            obstacles.forEach(o => {
                ctx.shadowBlur = 10; ctx.shadowColor = o.type === 'danger' ? '#ff3333' : '#00ff00';
                ctx.fillStyle = o.type === 'danger' ? '#200000' : '#001a00';
                ctx.strokeStyle = o.type === 'danger' ? '#ff3333' : '#00ff00';
                ctx.lineWidth = 2; ctx.fillRect(o.x-cameraX, o.y, o.w, o.h); ctx.strokeRect(o.x-cameraX, o.y, o.w, o.h);
            });

            if (player.alive) { ctx.shadowBlur = 15; ctx.shadowColor = player.color; ctx.fillStyle = player.color; ctx.fillRect(px-11, py-11, 22, 22); }
            particles.forEach(p => { ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fillStyle = `rgba(0, 255, 255, ${p.life})`; ctx.fillRect(p.x, p.y, p.size, p.size); });
            if (hook.active && player.alive) { ctx.shadowBlur = 15; ctx.shadowColor = '#ffff00'; ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(hook.x-cameraX, hook.y); ctx.stroke(); }

            if (guideOpacity > 0) {
                ctx.shadowBlur = 15 * guideOpacity; ctx.shadowColor = '#00ffff';
                ctx.strokeStyle = `rgba(0, 255, 255, ${guideOpacity})`; ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width/2 - 250, canvas.height/2 - 130, 500, 80);
                ctx.fillStyle = `rgba(0, 255, 255, ${guideOpacity})`; ctx.font = "bold 18px 'Courier New'"; ctx.textAlign = "center";
                ctx.fillText("A, D TO MOVE / SPACE TO JUMP", canvas.width/2, canvas.height/2 - 95);
                ctx.fillText("MOUSE CLICK TO HOOK / SHIFT TO PULL", canvas.width/2, canvas.height/2 - 70);
            }
            ctx.shadowBlur = 0; requestAnimationFrame(draw); update();
        }
        draw();
    </script>
</body>
</html>
